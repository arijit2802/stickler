name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      ANTHROPIC_API_KEY: stub
      OPENAI_API_KEY: stub
      TAVILY_API_KEY: stub
      BLOB_READ_WRITE_TOKEN: stub
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: next build
        run: npm run build

  # ── Deploy to Vercel ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deploy
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --yes 2>&1 | tail -1)
          echo "deployment-url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Post-deploy smoke test ─────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Health check — /api/health (3 attempts, 15s apart)
        run: |
          # Use the actual deployment URL from the deploy step, not a static env var
          BASE_URL="${{ needs.deploy.outputs.deployment-url }}"
          if [ -z "$BASE_URL" ]; then
            echo "No deployment URL from deploy step, aborting"
            exit 1
          fi
          echo "Smoke testing $BASE_URL"
          for i in 1 2 3; do
            echo "Attempt $i: GET $BASE_URL/api/health"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "HTTP $STATUS — waiting 15s before retry"
            sleep 15
          done
          echo "Smoke test failed after 3 attempts — triggering rollback"
          vercel rollback --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }} --yes || true
          exit 1
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
